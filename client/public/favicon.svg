<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Warm gold gradient: cream at top-left, deep tan at bottom-right -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0d9bb"/>
      <stop offset="100%" stop-color="#b8874a"/>
    </linearGradient>
    <!-- Subtle inner glow behind the sparkle -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c9a47a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a47a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Espresso rounded-square background (matches sidebar-bg) -->
  <rect width="32" height="32" rx="7.5" fill="#150d08"/>

  <!-- Subtle warm center glow so the icon doesn't look flat -->
  <rect width="32" height="32" rx="7.5" fill="url(#glow)"/>

  <!--
    Main 4-pointed sparkle.
    Four cubic-bezier curves, each starting and ending at a cardinal point.
    Control points pulled inward toward center make the sides concave,
    which gives the distinctive "sparkle" silhouette rather than a diamond.
  -->
  <path
    d="M16 3
       C 16.6 9.5  22.5 13.4  29 16
       C 22.5 18.6  16.6 22.5  16 29
       C 15.4 22.5  9.5 18.6   3 16
       C 9.5  13.4  15.4 9.5   16 3
       Z"
    fill="url(#gold)"
  />

  <!--
    Small secondary sparkle in the top-right corner.
    Adds depth and mirrors the little sparkle in the original Studify logo.
    The size ratio (large ÷ small ≈ 3:1) follows the Gemini-style convention.
  -->
  <path
    d="M25.5 7
       C 25.8 9   27 10.2  29 10.5
       C 27 10.8  25.8 12   25.5 14
       C 25.2 12  24 10.8   22 10.5
       C 24 10.2  25.2 9    25.5 7
       Z"
    fill="#f0d9bb"
    opacity="0.72"
  />
</svg>
